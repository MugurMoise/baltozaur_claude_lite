name: Supabase

# Deploy database changes through the Supabase CLI.

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'supabase/**'
      - 'scripts/validate-dev-migrations.sh'
      - '.github/workflows/supabase.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Find changed migrations
        id: migrations
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git ls-files 'supabase/migrations/*.sql' > /tmp/changed-migrations.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'supabase/migrations/*.sql' > /tmp/changed-migrations.txt
          fi
          {
            echo 'files<<EOF'
            cat /tmp/changed-migrations.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Guard dev migrations
        if: github.ref_name == 'dev'
        shell: bash
        run: |
          mapfile -t files < /tmp/changed-migrations.txt
          ./scripts/validate-dev-migrations.sh "${files[@]}"

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        if: steps.migrations.outputs.files != ''
        run: printf 'y\n' | supabase db push

      - name: Deploy Edge Functions
        if: github.ref_name == 'main' || github.ref_name == 'dev'
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
