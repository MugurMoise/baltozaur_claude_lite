name: Supabase

# Deploy database changes through the Supabase CLI.

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'supabase/**'
      - 'scripts/validate-dev-migrations.sh'
      - '.github/workflows/supabase.yml'
  workflow_dispatch:

concurrency:
  group: supabase-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.98.2

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Find changed migrations
        id: migrations
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git ls-files 'supabase/migrations/*.sql' > /tmp/changed-migrations.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'supabase/migrations/*.sql' > /tmp/changed-migrations.txt
          fi
          {
            echo 'files<<EOF'
            cat /tmp/changed-migrations.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Guard dev migrations
        if: github.ref_name == 'dev'
        shell: bash
        run: |
          mapfile -t files < /tmp/changed-migrations.txt
          ./scripts/validate-dev-migrations.sh "${files[@]}"

      - name: Link Supabase project
        run: timeout 180s supabase --debug --dns-resolver https link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        if: steps.migrations.outputs.files != ''
        shell: bash
        run: |
          set +e
          output="$(printf 'y\n' | supabase --debug --dns-resolver https db push 2>&1)"
          status=$?
          echo "$output"
          if [ "$status" -ne 0 ]; then
            message="$(echo "$output" | grep -Ei 'ERROR|SQLSTATE|failed|syntax|violates|permission|denied|owner|At statement|ErrorResponse' | tail -n 20)"
            if [ -z "$message" ]; then
              message="$(echo "$output" | tail -n 20)"
            fi
            message="${message//'%'/'%25'}"
            message="${message//$'\n'/'%0A'}"
            message="${message//$'\r'/'%0D'}"
            echo "::error title=Supabase db push failed::$message"
            exit "$status"
          fi

      - name: Deploy Edge Functions
        if: github.ref_name == 'main' || github.ref_name == 'dev'
        run: supabase --debug --dns-resolver https functions deploy --project-ref "$SUPABASE_PROJECT_REF"
